  # ─── Campaign State Schema Admin ─────────────────────────────────────────────
  /campaigns/{id}/state/schema:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/ObjectId'
    patch:
      tags: [State Schema Admin]
      summary: Add/update/delete campaign global state schema variables (admin)
      description: |
        Applies a list of schema operations (`add`, `update`, `delete`) to the campaign's
        `state` map in a single request.

        **Cross-reference protection:** Deleting a variable referenced by any terminal at
        `content.state.global.<name>` is rejected (409). Renaming a referenced variable
        rewrites all referencing terminals via `$rename` before the campaign write
        (terminals first, campaign last).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StateSchemaPatchRequest'
            example:
              ops:
                - action: add
                  name: siteOpen
                  entry:
                    type: boolean
                    default: false
                - action: update
                  name: mode
                  rename: phase
                  entry:
                    type: enum
                    values: [idle, active]
                    default: idle
                - action: delete
                  name: legacy
      responses:
        '200':
          description: Schema patched; returns flat post-update state snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    $ref: '#/components/schemas/FlatState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete references a terminal, or rename collision on a terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateSchemaConflictResponse'

