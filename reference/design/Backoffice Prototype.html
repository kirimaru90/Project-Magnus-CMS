<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>RobCo Backoffice — Prototipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #121210;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; }

  /* Make the frame fill the viewport when used as a top-level prototype
     (in the canvas it's bounded by an artboard instead). */
  #root > .bo-frame { width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared primitives, icons, mock data (Topbar/Sidebar etc are exported but we use Interactive ones below) -->
<script type="text/babel" src="components/shared.jsx"></script>
<!-- Helpers reused from the design exploration -->
<script type="text/babel" src="components/node-editor.jsx"></script>
<!-- Prototype-specific bits -->
<script type="text/babel" src="components/prototype-frame.jsx"></script>
<script type="text/babel" src="components/prototype-terminals.jsx"></script>
<script type="text/babel" src="components/prototype-editor.jsx"></script>
<script type="text/babel" src="components/prototype-state.jsx"></script>
<script type="text/babel" src="components/prototype-app.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<ProtoApp/>);
</script>

</body>
</html>
